[package]
name = "yield-splitter"
description = "Raíz yield splitter — splits incoming USDC remittances between spendable and a yield vault"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
authors = { workspace = true }

[lib]
crate-type = ["cdylib", "rlib"]
doctest = false

[dependencies]
soroban-sdk = { version = "23" }

[dev-dependencies]
soroban-sdk = { version = "23", features = ["testutils"] }
